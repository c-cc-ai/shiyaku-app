name: マスタデータ更新

on:
  workflow_dispatch:
    inputs:
      data:
        description: 'マスタデータ（JSON文字列）'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: data.json を更新
        run: |
          echo '${{ github.event.inputs.data }}' > data.json

      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "マスタ更新 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
