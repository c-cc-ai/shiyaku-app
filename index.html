<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reagent Order Name Search</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4fa;
  --white: #ffffff;
  --surface: #f7f9fd;
  --border: #d4dff0;
  --border-light: #e4ecf7;
  --accent: #2472e8;
  --accent-light: rgba(36,114,232,0.08);
  --accent2: #00a07a;
  --text: #1a2236;
  --text-dim: #4a5e80;
  --text-muted: #8a9ab8;
  --h1: #2472e8;
  --h2: #00a07a;
  --h3: #e07b00;
  --shadow: 0 2px 12px rgba(36,80,160,0.08);
  --shadow-md: 0 4px 20px rgba(36,80,160,0.12);
  --w-mediseo: #d4f5e2; --w-mediseo-b: #0a6b3a;
  --w-atesto: #ffe8cc; --w-atesto-b: #a04800;
  --w-alfressa: #ffe0ee; --w-alfressa-b: #9c1a5a;
  --w-wako: #ecdeff; --w-wako-b: #5b1fa8;
  --w-ksk: #fff9c4; --w-ksk-b: #7a6000;
  --w-sansyodo: #d0e8ff; --w-sansyodo-b: #003d99;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.app { max-width: 1400px; margin: 0 auto; padding: 0 20px 40px; }

.header { background: var(--white); border-bottom: 2px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 24px; border-radius: 0 0 12px 12px; box-shadow: var(--shadow); }
.header-logo { font-size: 22px; }
.header-title { font-size: 17px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

.steps { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
.step { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 100px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); color: var(--text-muted); background: var(--white); cursor: default; transition: all 0.2s; }
.step.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(36,114,232,0.3); }
.step.done { background: #e8f4ee; border-color: #7dc9a8; color: #1a7a50; }
.step-num { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; background: rgba(0,0,0,0.12); }
.step.active .step-num { background: rgba(255,255,255,0.3); }
.step.done .step-num { background: #7dc9a8; color: #fff; }
.step-arrow { color: var(--border); font-size: 14px; }

.card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
.card-header { background: var(--surface); border-bottom: 1px solid var(--border-light); padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
.card-title { font-size: 14px; font-weight: 700; }
.card-body { padding: 18px; }

/* Hospital selection */
#step-hospital { margin-bottom: 20px; }
.hospital-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 18px; }
.hospital-btn { padding: 18px 16px; border-radius: 12px; border: 2px solid var(--border); background: var(--white); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.18s; text-align: left; }
.hospital-btn:hover, .hospital-btn:focus-visible { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); box-shadow: var(--shadow-md); outline: none; }
.hospital-btn.selected { border-color: var(--accent); background: #e8f0fc; }
.hospital-btn .hname { font-size: 13px; font-weight: 700; color: var(--text); display: block; }
.hospital-btn .hcount { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: block; }
.hospital-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-bottom: 8px; }
.hospital-btn .hdraft { font-size: 10px; color: var(--h3); font-weight: 700; margin-top: 3px; display: block; }

/* Search panel */
#step-search { margin-bottom: 20px; display: none; }
.search-bar { display: flex; gap: 10px; padding: 18px; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
.search-wrap { flex: 1; position: relative; min-width: 200px; }
.search-input { width: 100%; padding: 12px 16px 12px 42px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; border: 1.5px solid var(--border); border-radius: 10px; background: var(--white); color: var(--text); outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(36,114,232,0.1); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }
.search-input::placeholder { color: var(--text-muted); }
.btn-change { padding: 10px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; font-size: 12px; cursor: pointer; color: var(--text-dim); font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; }
.btn-change:hover { border-color: var(--accent); color: var(--accent); }
.btn-add-new { padding: 10px 16px; background: #e8f4ee; border: 1.5px solid #7dc9a8; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; color: #1a7a50; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; transition: all 0.15s; }
.btn-add-new:hover { background: #00a07a; color: #fff; border-color: #00a07a; }

/* suggest */
.suggest-box { position: absolute; top: 100%; left: 0; right: 0; z-index: 200; margin-top: 4px; background: var(--white); border: 1.5px solid var(--accent); border-radius: 10px; box-shadow: var(--shadow-md); display: none; max-height: 360px; overflow-y: auto; }
.suggest-box.open { display: block; }
.suggest-header { padding: 6px 16px; background: #eef3fb; border-bottom: 1px solid var(--border-light); font-size: 11px; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1; }
.suggest-count { color: var(--accent); font-family: 'DM Mono', monospace; }
.suggest-item { padding: 10px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-light); transition: background 0.1s; }
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item.active { background: var(--accent-light); }
.suggest-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* results */
.results-meta { padding: 10px 18px; display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-dim); border-bottom: 1px solid var(--border-light); background: var(--surface); flex-wrap: wrap; }
.results-count { font-family: 'DM Mono', monospace; color: var(--accent); font-weight: 600; }
.selected-hospital-badge { display: inline-flex; align-items: center; justify-content: center; text-align: center; border-radius: 8px; border: 2px solid var(--accent); background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 700; line-height: 1.2; padding: 5px 12px; white-space: nowrap; flex-shrink: 0; }

/* table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { background: #eef3fb; }
th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-dim); white-space: nowrap; border-bottom: 2px solid var(--border); text-transform: uppercase; }
tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.1s; }
tbody tr:hover { background: var(--accent-light); }
td { padding: 11px 14px; vertical-align: middle; }
.td-order { font-weight: 600; color: var(--text); white-space: nowrap; }
.td-ncd { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.td-jan { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.td-maker { font-family: 'Noto Sans JP', sans-serif; font-size: 12.5px; color: var(--text); white-space: nowrap; }
.td-product { font-family: 'Noto Sans JP', sans-serif; font-size: 12.5px; color: var(--text); max-width: 260px; word-break: break-all; }
.td-pack { font-family: 'Noto Sans JP', sans-serif; font-size: 12.5px; color: var(--text-dim); white-space: nowrap; }
.td-notes { max-width: 200px; }
.note-tag { background: rgba(217,54,54,0.07); border: 1px solid rgba(217,54,54,0.2); border-radius: 5px; padding: 2px 8px; font-size: 10px; color: #c03030; display: inline-block; word-break: break-all; max-width: 190px; }
.highlight { background: rgba(36,114,232,0.15); color: var(--accent); font-weight: 700; border-radius: 2px; padding: 0 1px; }

/* 納入卸バッジ */
.badge-w { display: inline-block; border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-w-mediseo  { background: var(--w-mediseo);  color: var(--w-mediseo-b);  border: 1px solid var(--w-mediseo-b); }
.badge-w-atesto   { background: var(--w-atesto);   color: var(--w-atesto-b);   border: 1px solid var(--w-atesto-b); }
.badge-w-alfressa { background: var(--w-alfressa); color: var(--w-alfressa-b); border: 1px solid var(--w-alfressa-b); }
.badge-w-wako     { background: var(--w-wako);     color: var(--w-wako-b);     border: 1px solid var(--w-wako-b); }
.badge-w-ksk      { background: var(--w-ksk);      color: var(--w-ksk-b);      border: 1px solid var(--w-ksk-b); }
.badge-w-sansyodo { background: var(--w-sansyodo); color: var(--w-sansyodo-b); border: 1px solid var(--w-sansyodo-b); }

/* action buttons */
.td-actions { display: flex; gap: 4px; white-space: nowrap; }
.btn-add-list { padding: 5px 12px; background: #e8f4ee; border: 1.5px solid #7dc9a8; border-radius: 8px; font-size: 11px; font-weight: 700; color: #1a7a50; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; transition: all 0.15s; }
.btn-add-list:hover { background: #00a07a; color: #fff; border-color: #00a07a; }
.btn-add-list.added { background: #d0eaff; border-color: var(--accent); color: var(--accent); }
.btn-edit { padding: 5px 10px; background: #fff8e0; border: 1.5px solid #f0c040; border-radius: 8px; font-size: 11px; font-weight: 700; color: #7a5c00; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.btn-edit:hover { background: #f0c040; color: #000; }
.btn-del { padding: 5px 10px; background: #fff5f5; border: 1.5px solid #f0a0a0; border-radius: 8px; font-size: 11px; font-weight: 700; color: #c03030; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.btn-del:hover { background: #c03030; color: #fff; border-color: #c03030; }

tbody tr:focus { outline: 2px solid var(--accent); outline-offset: -2px; background: var(--accent-light); }
tbody tr:focus .btn-add-list { box-shadow: 0 0 0 2px rgba(36,114,232,0.25); }


.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* 発注リストパネル */
#order-list-panel { margin-top: 20px; }
.order-list-wrap { padding: 0; }
.order-list-empty { padding: 32px; text-align: center; color: var(--text-muted); font-size: 13px; }
.order-list-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.order-list-table thead tr { background: #eef3fb; }
.order-list-table th { padding: 9px 12px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-dim); white-space: nowrap; border-bottom: 2px solid var(--border); text-transform: uppercase; }
.order-list-table tbody tr { border-bottom: 1px solid var(--border-light); }
.order-list-table tbody tr[tabindex="0"]:focus { outline: 2px solid var(--accent); outline-offset: -2px; background: var(--accent-light); }
.order-list-table td { padding: 10px 12px; vertical-align: middle; }
.order-list-count-cell { display: flex; align-items: center; gap: 6px; }
.order-count-btn { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.order-count-btn:hover { border-color: var(--accent); color: var(--accent); }
.order-count-num { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 14px; min-width: 40px; max-width: 56px; text-align: center; border: 1.5px solid transparent; border-radius: 6px; background: transparent; color: var(--text); outline: none; padding: 2px 4px; transition: border-color 0.18s, background 0.18s; -moz-appearance: textfield; }
.order-count-num:hover { border-color: var(--border); background: var(--surface); }
.order-count-num:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 2px rgba(36,114,232,0.10); }
.order-count-num::-webkit-outer-spin-button, .order-count-num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.btn-remove-item { padding: 4px 10px; border: 1.5px solid #f0a0a0; background: #fff5f5; border-radius: 7px; font-size: 11px; color: #c03030; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.btn-remove-item:hover { background: #c03030; color: #fff; border-color: #c03030; }
.order-remarks-static { display: inline-block; width: 100%; min-width: 90px; max-width: 200px; padding: 4px 8px; font-size: 11px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); }
.order-remarks-input { width: 100%; min-width: 90px; max-width: 200px; padding: 4px 8px; font-size: 11px; font-family: 'Noto Sans JP', sans-serif; border: 1.5px solid transparent; border-radius: 6px; background: transparent; color: var(--text); outline: none; transition: border-color 0.18s, background 0.18s; }
.order-remarks-input:hover { border-color: var(--border); background: var(--surface); }
.order-remarks-input:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 2px rgba(36,114,232,0.10); }
.order-remarks-input::placeholder { color: var(--text-muted); }
.order-list-footer { padding: 14px 18px; background: var(--surface); border-top: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.order-list-footer .item-count { font-size: 12px; color: var(--text-dim); }
.order-list-footer .item-count span { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--accent); }
.btn-clear-list { padding: 8px 16px; background: #fff5f5; border: 1.5px solid #f0a0a0; border-radius: 9px; font-size: 12px; color: #c03030; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.btn-clear-list:hover { background: #c03030; color: #fff; }
.draft-badge { background: #fff3cd; border: 1px solid #f0c040; border-radius: 100px; padding: 2px 10px; font-size: 11px; font-weight: 700; color: #7a5c00; margin-left: auto; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 16px; padding: 28px; width: 560px; max-width: calc(100vw - 32px); box-shadow: 0 8px 40px rgba(36,80,160,0.18); max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-grid .full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.04em; }
.form-input { padding: 9px 12px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); outline: none; transition: border-color 0.2s; }
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(36,114,232,0.1); }
.modal-footer { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; }
.btn-primary { padding: 10px 22px; background: var(--accent); border: none; border-radius: 9px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.btn-primary:hover { background: #1a5ec8; }
.btn-secondary { padding: 10px 22px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 9px; color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.modal-new-badge { background: #e8f4ee; border: 1px solid #7dc9a8; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #1a7a50; font-weight: 700; }
.modal-edit-badge { background: #fff8e0; border: 1px solid #f0c040; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #7a5c00; font-weight: 700; }

/* Confirm dialog */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; align-items: center; justify-content: center; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: var(--white); border-radius: 14px; padding: 24px; width: 360px; max-width: calc(100vw - 32px); box-shadow: 0 8px 40px rgba(36,80,160,0.18); text-align: center; }
.confirm-icon { font-size: 32px; margin-bottom: 12px; }
.confirm-msg { font-size: 14px; color: var(--text); margin-bottom: 18px; line-height: 1.6; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }

/* Local-edit badge */
.local-badge { background: #e8f4ee; border: 1px solid #7dc9a8; border-radius: 5px; padding: 1px 6px; font-size: 10px; color: #1a7a50; font-weight: 700; margin-left: 4px; vertical-align: middle; }
.local-del-badge { background: #fff0f0; border: 1px solid #f0a0a0; border-radius: 5px; padding: 1px 6px; font-size: 10px; color: #c03030; font-weight: 700; margin-left: 4px; vertical-align: middle; text-decoration: line-through; }

@media print {
  body { background: #fff; }
  .header, .steps, #step-hospital, #step-search { display: none !important; }
  .card { box-shadow: none; border: 1px solid #ccc; }
}

/* 管理パネル */
.admin-panel { background: var(--white); border: 1px solid #c7c0f7; border-radius: 14px; box-shadow: var(--shadow); padding: 12px 18px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.btn-save { padding: 9px 24px; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; border: none; background: #4f46e5; color: #fff; transition: all 0.15s; }
.btn-save:hover { background: #3730a3; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.save-status { font-size: 12px; padding: 5px 12px; border-radius: 8px; display: none; }
.save-status.success { background: #e8f4ee; color: #1a7a50; display: block; }
.save-status.error { background: #fde8e8; color: #9c1a1a; display: block; }
.save-status.loading { background: #f0f4ff; color: #4f46e5; display: block; }
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">🔬</div>
  <div>
    <div class="header-title">試薬発注名称検索</div>
    <div class="header-sub">協同組合薬剤センター</div>
  </div>
</div>
<div class="app">

  <div class="steps">
    <div class="step active" id="stp1"><span class="step-num">1</span> 院所選択</div>
    <span class="step-arrow">▶</span>
    <div class="step" id="stp2"><span class="step-num">2</span> 商品検索</div>
    <span class="step-arrow">▶</span>
    <div class="step" id="stp3"><span class="step-num">3</span> 発注リスト</div>
  </div>

  <!-- 管理パネル -->
  <div class="admin-panel" id="adminPanel">
    <button class="btn-save" id="btnSave" onclick="saveToGitHub()">💾 保存</button>
    <div class="save-status" id="saveStatus"></div>
  </div>

  <!-- STEP 1 -->
  <div class="card" id="step-hospital">
    <div class="card-header">
      <span>🏥</span>
      <span class="card-title">発注する院所を選択してください</span>
    </div>
    <div class="hospital-grid" id="hospitalGrid"></div>
  </div>

  <!-- STEP 2 -->
  <div class="card" id="step-search">
    <div class="card-header">
      <span>🔍</span>
      <span class="card-title" id="searchTitle">商品を検索</span>
      <div style="margin-left:auto; display:flex; gap:8px;">
        <span id="selectedBadge" class="selected-hospital-badge"></span>
        <button class="btn-change" onclick="goBackToHospital()">← 院所変更</button>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="院所発注表記で検索…" autocomplete="off">

      </div>
      <button class="btn-add-new" id="btnAddNew" onclick="openAddModal()">新規商品追加</button>
    </div>
    <div class="results-meta" id="resultsMeta" style="display:none">
      <span class="results-count" id="resultsCount"></span>
      <span id="resultsSub"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>

<script>
// ─────────────────────────────────────────
// Data
// ─────────────────────────────────────────

// ─── GitHub 設定 ────────────────────────────────────────────
const GH_OWNER = 'c-cc-ai';
const GH_REPO  = 'shiyaku-app';
const GH_PA_TOKEN = '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';
const GH_FILE_PATH = 'data.json';

let MASTER_DATA = {};

// ─── 起動時に GitHub から data.json を fetch ───────────────
async function loadMasterData() {
  document.getElementById('hospitalGrid').innerHTML =
    '<div style="padding:24px;color:var(--text-muted)">⏳ データ読み込み中…</div>';
  const url = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE_PATH}?_=${Date.now()}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    MASTER_DATA = await res.json();
  } catch (e) {
    document.getElementById('hospitalGrid').innerHTML =
      `<div style="padding:24px;color:#c03030">❌ データ読み込み失敗: ${e.message}<br>ページを再読み込みしてください。</div>`;
    return false;
  }
  return true;
}

// ─── 管理機能 ────────────────────────────────

// ─── GitHub Contents API でマスタ直接保存 ────────────────────

async function saveToGitHub() {
  const btn    = document.getElementById('btnSave');
  const status = document.getElementById('saveStatus');

  if (!GH_PA_TOKEN) {
    status.className = 'save-status error';
    status.textContent = '❌ トークン未設定です。管理者にお問い合わせください。';
    return;
  }

  // 現在のマスタ（ローカル編集統合）をJSON化
  const masterData = {};
  for (const facility of hospitals) {
    masterData[facility] = getFacilityData(facility).map(r => {
      const clean = { ...r };
      delete clean._masterIdx;
      delete clean._addedIdx;
      delete clean._local;
      return clean;
    });
  }
  const jsonStr = JSON.stringify(masterData, null, 2);

  btn.disabled = true;
  status.className = 'save-status loading';
  status.textContent = '⏳ 保存中…';

  const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE_PATH}`;
  const headers = {
    'Authorization': `token ${GH_PA_TOKEN}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };

  try {
    // ① 現在のファイルの SHA を取得（更新に必要）
    let sha = null;
    const getRes = await fetch(apiUrl, { headers });
    if (getRes.ok) {
      const fileInfo = await getRes.json();
      sha = fileInfo.sha;
    } else if (getRes.status !== 404) {
      const err = await getRes.json().catch(() => ({}));
      throw new Error(err.message || `SHA取得エラー (${getRes.status})`);
    }

    // ② ファイル内容を Base64 エンコード
    const base64Content = btoa(unescape(encodeURIComponent(jsonStr)));

    // ③ PUT でファイルを作成または更新
    const body = {
      message: `マスタ更新 ${new Date().toLocaleString('ja-JP')}`,
      content: base64Content,
    };
    if (sha) body.sha = sha;  // 既存ファイルの場合は SHA が必要

    const putRes = await fetch(apiUrl, {
      method: 'PUT',
      headers,
      body: JSON.stringify(body)
    });

    if (putRes.ok) {
      status.className = 'save-status success';
      status.textContent = '✅ 保存完了！まもなく全端末へ反映されます。';
      setTimeout(() => { status.className = 'save-status'; }, 8000);
    } else {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(err.message || `保存エラー (${putRes.status})`);
    }

  } catch (e) {
    status.className = 'save-status error';
    status.textContent = `❌ ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ─── Per-facility local overrides ───────────
const LS_KEY = 'shiyaku_localEdits_v1';

function loadAllEditsFromStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    // deletedはSetに戻す
    for (const facility in parsed) {
      parsed[facility].deleted = new Set(parsed[facility].deleted || []);
    }
    return parsed;
  } catch (e) {
    console.warn('localEdits読み込み失敗:', e);
    return {};
  }
}

function saveAllEditsToStorage(allEdits) {
  try {
    const serializable = {};
    for (const facility in allEdits) {
      serializable[facility] = {
        added: allEdits[facility].added,
        edited: allEdits[facility].edited,
        deleted: Array.from(allEdits[facility].deleted),
      };
    }
    localStorage.setItem(LS_KEY, JSON.stringify(serializable));
  } catch (e) {
    console.warn('localEdits保存失敗:', e);
  }
}

const localEdits = loadAllEditsFromStorage();

function getLocalEdits(facility) {
  if (!localEdits[facility]) localEdits[facility] = { added: [], edited: {}, deleted: new Set() };
  return localEdits[facility];
}

function saveLocalEdits() {
  saveAllEditsToStorage(localEdits);
}

function getFacilityData(facility) {
  const master = MASTER_DATA[facility] || [];
  const edits = getLocalEdits(facility);
  const result = [];
  master.forEach((item, idx) => {
    if (edits.deleted.has(idx)) return;
    if (edits.edited[idx] !== undefined) {
      result.push({ ...edits.edited[idx], _masterIdx: idx, _local: 'edited' });
    } else {
      result.push({ ...item, _masterIdx: idx });
    }
  });
  edits.added.forEach((item, i) => {
    result.push({ ...item, _addedIdx: i, _local: 'added' });
  });
  return result;
}

let hospitals = [];
const H_COLORS_ARR = ['#2472e8','#00a07a','#e07b00','#7c3aed','#c0306c','#b45309','#0891b2','#15803d'];

// ─── 発注リスト localStorage永続化 ───────────
const LS_ORDER_KEY = 'shiyaku_orderLists_v1';

function loadOrderListsFromStorage() {
  try {
    const raw = localStorage.getItem(LS_ORDER_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch(e) {
    console.warn('orderLists読み込み失敗:', e);
    return {};
  }
}

function saveOrderListsToStorage() {
  try {
    localStorage.setItem(LS_ORDER_KEY, JSON.stringify(orderLists));
  } catch(e) {
    console.warn('orderLists保存失敗:', e);
  }
}

const orderLists = loadOrderListsFromStorage();
let selectedHospital = null;
let query = '';
let modalMode = null; // 'add' | 'edit'
let editTarget = null; // {facility, masterIdx, addedIdx}
let confirmCallback = null;

function getOrderList(hospital) {
  if (!hospital) return {};
  if (!orderLists[hospital]) orderLists[hospital] = { keys: [], entries: {} };
  return orderLists[hospital];
}

function addToOrderList(r) {
  const listObj = getOrderList(selectedHospital);
  const key = r['ncdCode'] || (r['orderName'] + '_' + r['productName']);
  if (!listObj.entries[key]) {
    listObj.entries[key] = { item: r, qty: 1 };
    listObj.keys.push(key);
  } else {
    listObj.entries[key].qty++;
  }
  // list変数への後方互換（removeFromOrderList等が使う）
  const list = listObj;
  saveOrderListsToStorage();
  renderOrderList();
  renderTable();
  updateHospitalGrid();
  // 追加後は同じ行の「追加済」ボタンにフォーカスを戻す（行をキーで再選択可能に）
  setTimeout(() => {
    // 追加した商品のキーで行を特定してフォーカス
    const rows = Array.from(document.querySelectorAll('#tableBody tr[tabindex="0"]'));
    const nq = normalizeQuery(r['orderName'] || '');
    let targetRow = null;
    for (const row of rows) {
      const nameCell = row.querySelector('.td-order');
      if (nameCell && normalizeQuery(nameCell.textContent).includes(nq)) {
        targetRow = row;
        break;
      }
    }
    if (targetRow) {
      targetRow.focus();
      targetRow.scrollIntoView({ block: 'nearest' });
    } else {
      const firstRow = rows[0];
      if (firstRow) firstRow.focus(); else searchInput.focus();
    }
  }, 0);
}

function removeFromOrderList(key) {
  const listObj = getOrderList(selectedHospital);
  delete listObj.entries[key];
  listObj.keys = listObj.keys.filter(k => k !== key);
  saveOrderListsToStorage();
  renderOrderList();
  renderTable();
  updateHospitalGrid();
}

function setOrderRemarks(key, value) {
  const listObj = getOrderList(selectedHospital);
  if (!listObj.entries[key]) return;
  listObj.entries[key].remarksOverride = value;
  saveOrderListsToStorage();
  // 再描画せずに値だけ保持（フォーカスを失わせない）
}

function changeQty(key, delta) {
  const listObj = getOrderList(selectedHospital);
  if (!listObj.entries[key]) return;
  listObj.entries[key].qty = Math.max(1, listObj.entries[key].qty + delta);
  saveOrderListsToStorage();
  // スピンボタン押下時はinputの値だけ更新（フォーカスを失わせない）
  const input = document.querySelector(`.order-count-num[data-key="${CSS.escape(key)}"]`);
  if (input) input.value = listObj.entries[key].qty;
  else renderOrderList();
}

function setQtyDirect(key, inputEl) {
  const listObj = getOrderList(selectedHospital);
  if (!listObj.entries[key]) return;
  const v = parseInt(inputEl.value, 10);
  if (!isNaN(v) && v >= 1) {
    listObj.entries[key].qty = v;
    saveOrderListsToStorage();
  } else if (inputEl.value === '') {
    // 入力中は保持しない（フォーカスアウト時に補正）
  }
}

// ─── 発注リスト キーボードナビゲーション ───────
function attachOrderListKeyNav() {
  const rows = Array.from(document.querySelectorAll('#orderListBody tr[tabindex="0"]'));
  rows.forEach((row, i) => {
    row.addEventListener('keydown', (e) => {
      if (e.target !== row) return;
      if (e.key === 'Enter' || e.key === 'ArrowDown') {
        e.preventDefault();
        // 数量inputへフォーカス
        const qtyInput = row.querySelector('.order-count-num');
        if (qtyInput) { qtyInput.focus(); qtyInput.select(); }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = rows[i - 1];
        if (prev) { prev.focus(); prev.scrollIntoView({ block: 'nearest' }); }
        else searchInput.focus();
      } else if (e.key === 'Escape') {
        searchInput.focus();
      }
    });

    // 数量inputのキー操作
    const qtyInput = row.querySelector('.order-count-num');
    if (qtyInput) {
      qtyInput.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          changeQty(qtyInput.dataset.key, 1);
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          changeQty(qtyInput.dataset.key, -1);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          // 次の行の行セルへ（なければ検索欄へ）
          const next = rows[i + 1];
          if (next) { next.focus(); next.scrollIntoView({ block: 'nearest' }); }
          else searchInput.focus();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          row.focus();
        }
      });
      // フォーカスアウト時に不正値を補正
      qtyInput.addEventListener('blur', () => {
        const key = qtyInput.dataset.key;
        const listObj = getOrderList(selectedHospital);
        if (!listObj.entries[key]) return;
        const v = parseInt(qtyInput.value, 10);
        if (isNaN(v) || v < 1) {
          qtyInput.value = listObj.entries[key].qty;
        } else {
          listObj.entries[key].qty = v;
        }
      });
    }
  });
}

function clearOrderList() {
  if (!selectedHospital) return;
  if (!confirm('発注リストをクリアしますか？')) return;
  orderLists[selectedHospital] = { keys: [], entries: {} };
  saveOrderListsToStorage();
  renderOrderList();
  renderTable();
  updateHospitalGrid();
}

function isInOrderList(r) {
  const listObj = getOrderList(selectedHospital);
  const key = r['ncdCode'] || (r['orderName'] + '_' + r['productName']);
  return !!listObj.entries[key];
}

// ─── helpers ───────────────────────────────
function hira2kata(str) { return str.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60)); }
function zenkaku2hankaku(str) {
  const m = {'ァ':'ｧ','ア':'ｱ','ィ':'ｨ','イ':'ｲ','ゥ':'ｩ','ウ':'ｳ','ェ':'ｪ','エ':'ｴ','ォ':'ｫ','オ':'ｵ','カ':'ｶ','ガ':'ｶﾞ','キ':'ｷ','ギ':'ｷﾞ','ク':'ｸ','グ':'ｸﾞ','ケ':'ｹ','ゲ':'ｹﾞ','コ':'ｺ','ゴ':'ｺﾞ','サ':'ｻ','ザ':'ｻﾞ','シ':'ｼ','ジ':'ｼﾞ','ス':'ｽ','ズ':'ｽﾞ','セ':'ｾ','ゼ':'ｾﾞ','ソ':'ｿ','ゾ':'ｿﾞ','タ':'ﾀ','ダ':'ﾀﾞ','チ':'ﾁ','ヂ':'ﾁﾞ','ッ':'ｯ','ツ':'ﾂ','ヅ':'ﾂﾞ','テ':'ﾃ','デ':'ﾃﾞ','ト':'ﾄ','ド':'ﾄﾞ','ナ':'ﾅ','ニ':'ﾆ','ヌ':'ﾇ','ネ':'ﾈ','ノ':'ﾉ','ハ':'ﾊ','バ':'ﾊﾞ','パ':'ﾊﾟ','ヒ':'ﾋ','ビ':'ﾋﾞ','ピ':'ﾋﾟ','フ':'ﾌ','ブ':'ﾌﾞ','プ':'ﾌﾟ','ヘ':'ﾍ','ベ':'ﾍﾞ','ペ':'ﾍﾟ','ホ':'ﾎ','ボ':'ﾎﾞ','ポ':'ﾎﾟ','マ':'ﾏ','ミ':'ﾐ','ム':'ﾑ','メ':'ﾒ','モ':'ﾓ','ャ':'ｬ','ヤ':'ﾔ','ュ':'ｭ','ユ':'ﾕ','ョ':'ｮ','ヨ':'ﾖ','ラ':'ﾗ','リ':'ﾘ','ル':'ﾙ','レ':'ﾚ','ロ':'ﾛ','ヮ':'ﾜ','ワ':'ﾜ','ヲ':'ｦ','ン':'ﾝ','ヴ':'ｳﾞ','ー':'ｰ','。':'｡','「':'｢','」':'｣','、':'､','・':'･'};
  return str.replace(/[ァ-ヶー。「」、・]/g, c => m[c] || c);
}
function zenEisu2hanEisu(str) { return str.replace(/[\uFF01-\uFF5E]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/\u3000/g, ' '); }
function normalizeQuery(q) { let s = q; s = zenEisu2hanEisu(s); s = hira2kata(s); s = zenkaku2hankaku(s); return s.toLowerCase(); }

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function wholesalerClass(w) {
  if (!w) return '';
  const n = normalizeQuery(w);
  if (n.includes('ﾒﾃﾞｨｾｵ')) return 'badge-w-mediseo';
  if (n.includes('ｱﾃｽﾄ')) return 'badge-w-atesto';
  if (n.includes('ｱﾙﾌﾚｯｻ')) return 'badge-w-alfressa';
  if (n.includes('和光') || n.includes('ﾜｺｰ')) return 'badge-w-wako';
  if (n.includes('ｹｰｴｽｹｰ')) return 'badge-w-ksk';
  if (n.includes('三笑堂') || n.includes('ｽｽﾞｹﾝ') || n.includes('スズケン')) return 'badge-w-sansyodo';
  return '';
}

function highlight(text, q) {
  if (!q) return esc(text);
  const nq = normalizeQuery(q);
  const nt = normalizeQuery(text);
  const idx = nt.indexOf(nq);
  if (idx < 0) return esc(text);
  return esc(text.slice(0, idx)) + '<span class="highlight">' + esc(text.slice(idx, idx + nq.length)) + '</span>' + esc(text.slice(idx + nq.length));
}

// ─── Hospital grid ──────────────────────────
const hospitalGrid = document.getElementById('hospitalGrid');

function buildHospitalGrid() {
  hospitalGrid.innerHTML = '';
  hospitals.forEach((h, i) => {
    const count = getFacilityData(h).length;
    const color = H_COLORS_ARR[i] || '#888';
    const btn = document.createElement('button');
    btn.className = 'hospital-btn' + (h === selectedHospital ? ' selected' : '');
    btn.dataset.hospital = h;
    const draftItems = getOrderList(h).keys ? getOrderList(h).keys.length : 0;
    const edits = getLocalEdits(h);
    const localCount = edits.added.length + Object.keys(edits.edited).length + edits.deleted.size;
    const draftHtml = draftItems > 0 ? `<span class="hdraft">📋 発注リスト ${draftItems}品目</span>` : '';
    btn.innerHTML = `<span class="hospital-dot" style="background:${color}"></span><span class="hname">${esc(h)}</span><span class="hcount">${count}件の試薬</span>${draftHtml}`;
    btn.onclick = () => selectHospital(h);
    btn.addEventListener('keydown', (e) => {
      const btns = Array.from(hospitalGrid.querySelectorAll('.hospital-btn'));
      const idx = btns.indexOf(e.currentTarget);
      const cols = Math.round(hospitalGrid.offsetWidth / (btns[0] ? btns[0].offsetWidth + 12 : 232));
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        const next = btns[idx + 1]; if (next) next.focus();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const prev = btns[idx - 1]; if (prev) prev.focus();
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = btns[idx + cols]; if (next) next.focus(); else btns[btns.length - 1]?.focus();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = btns[idx - cols]; if (prev) prev.focus(); else btns[0]?.focus();
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectHospital(h);
      }
    });
    hospitalGrid.appendChild(btn);
  });
  // 最初のボタンにtabindexを設定してTab移動でフォーカス可能にする
  const firstBtn = hospitalGrid.querySelector('.hospital-btn');
  if (firstBtn) firstBtn.setAttribute('tabindex', '0');
  hospitalGrid.querySelectorAll('.hospital-btn:not(:first-child)').forEach(b => b.setAttribute('tabindex', '-1'));
  // フォーカス時に該当ボタンだけtabindex=0にする（roving tabindex）
  hospitalGrid.querySelectorAll('.hospital-btn').forEach(btn => {
    btn.addEventListener('focus', () => {
      hospitalGrid.querySelectorAll('.hospital-btn').forEach(b => b.setAttribute('tabindex', '-1'));
      btn.setAttribute('tabindex', '0');
    });
  });
}

function updateHospitalGrid() {
  hospitals.forEach(h => {
    const btn = hospitalGrid.querySelector(`[data-hospital]`);
  });
  buildHospitalGrid();
}

// ─── 起動処理 ─────────────────────────────────────────────
(async () => {
  const ok = await loadMasterData();
  if (!ok) return;
  hospitals = Object.keys(MASTER_DATA);
  buildHospitalGrid();
  // 最初の院所ボタンに自動フォーカス
  setTimeout(() => {
    const firstBtn = hospitalGrid.querySelector('.hospital-btn');
    if (firstBtn) firstBtn.focus();
  }, 100);
})();

function selectHospital(h) {
  selectedHospital = h;
  query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('step-hospital').style.display = 'none';
  document.getElementById('step-search').style.display = 'block';
  document.getElementById('searchTitle').textContent = h + ' — 商品を検索';
  document.getElementById('selectedBadge').textContent = h;
  setStep(2);
  renderTable();
  renderOrderList();
  // 院所選択後は検索入力にフォーカス
  setTimeout(() => searchInput.focus(), 50);
}

function goBackToHospital() {
  const prevHospital = selectedHospital;
  selectedHospital = null;
  query = '';
  document.getElementById('step-hospital').style.display = 'block';
  document.getElementById('step-search').style.display = 'none';
  document.getElementById('order-list-panel').style.display = 'none';
  setStep(1);
  buildHospitalGrid();
  // 以前選択していた院所ボタンにフォーカス（なければ先頭）
  setTimeout(() => {
    const prevBtn = prevHospital ? hospitalGrid.querySelector(`[data-hospital="${CSS.escape(prevHospital)}"]`) : null;
    const focusBtn = prevBtn || hospitalGrid.querySelector('.hospital-btn');
    if (focusBtn) focusBtn.focus();
  }, 50);
}

function setStep(n) {
  [1, 2, 3].forEach(i => {
    const el = document.getElementById('stp' + i);
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  });
}

// ─── Search ─────────────────────────────────
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('input', () => { query = searchInput.value.trim(); renderTable(); });

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === 'ArrowDown') {
    e.preventDefault();
    // フォーカスを検索結果の1行目へ移動
    const firstRow = document.querySelector('#tableBody tr[tabindex="0"]');
    if (firstRow) {
      firstRow.focus();
      firstRow.scrollIntoView({ block: 'nearest' });
    } else {
      // 検索結果がない場合は発注リストの1行目へ
      const firstOrderRow = document.querySelector('#orderListBody tr[tabindex="0"]');
      if (firstOrderRow) {
        firstOrderRow.focus();
        firstOrderRow.scrollIntoView({ block: 'nearest' });
      }
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    // 院所変更ボタンへフォーカス移動
    document.querySelector('.btn-change').focus();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    document.getElementById('btnAddNew').focus();
  } else if (e.key === 'Escape') {
    searchInput.value = '';
    query = '';
    renderTable();
  }
});

// 「新規商品追加」ボタン：←キーで検索入力に戻る
document.getElementById('btnAddNew').addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    searchInput.focus();
  }
});

// 「院所変更」ボタン：↓キーで検索入力に戻る
document.querySelector('.btn-change').addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchInput.focus();
  }
});

function getFiltered() {
  if (!selectedHospital) return [];
  const data = getFacilityData(selectedHospital);
  const nq = normalizeQuery(query);
  if (!nq) return data;
  return data.filter(r => {
    const nv = normalizeQuery(r['orderName'] || '');
    return nv.includes(nq);
  });
}

function renderTable() {
  const meta = document.getElementById('resultsMeta');
  const tbody = document.getElementById('tableBody');
  if (!selectedHospital) {
    meta.style.display = 'none';
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🏥</div><p>まず院所を選択してください</p></div></td></tr>';
    return;
  }
  const results = getFiltered();
  meta.style.display = 'flex';
  document.getElementById('resultsCount').textContent = results.length + '件';
  document.getElementById('resultsSub').textContent = query ? `"${query}" の検索結果` : '院所の全試薬';

  if (!query) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🔍</div><p>院所発注表記を入力して検索してください</p></div></td></tr>';
    return;
  }
  if (!results.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">🔍</div><p>該当する試薬が見つかりません</p></div></td></tr>';
    return;
  }

  tbody.innerHTML = results.map(r => {
    const wClass = wholesalerClass(r['wholesaler'] || '');
    const wBadge = wClass
      ? `<span class="badge-w ${wClass}">${esc(r['wholesaler'])}</span>`
      : `<span style="font-size:12px;color:var(--text)">${esc(r['wholesaler'] || '')}</span>`;
    const inList = isInOrderList(r);
    const btnClass = inList ? 'btn-add-list added' : 'btn-add-list';
    const btnLabel = inList ? '✓ 追加済' : 'リスト追加';
    const localBadge = '';
    const rData = JSON.stringify(r).replace(/"/g, '&quot;');
    // Build edit/del onclick safely
    const masterIdx = r._masterIdx !== undefined ? r._masterIdx : -1;
    const addedIdx = r._addedIdx !== undefined ? r._addedIdx : -1;
    return `<tr tabindex="0">
      <td class="td-order">${highlight(r['orderName'] || '', query)}${localBadge}</td>
      <td class="td-ncd" style="${(r['ncdCode'] || '') === '-' ? 'text-align:center' : ''}">${esc(r['ncdCode'] || '')}</td>
      <td class="td-jan">${esc(r['janCode'] || '')}</td>
      <td class="td-maker">${esc(r['maker'] || '')}</td>
      <td>${wBadge}</td>
      <td class="td-product" title="${esc(r['productName'] || '')}">${esc(r['productName'] || '')}</td>
      <td class="td-pack">${esc(r['package'] || '')}</td>
      <td class="td-notes">${r['remarks'] ? `<span class="note-tag" title="${esc(r['remarks'])}">${esc(r['remarks'])}</span>` : ''}</td>
      <td>
        <div class="td-actions">
          <button class="${btnClass}" onclick='addToOrderList(${rData})'>${btnLabel}</button>
          <button class="btn-edit" onclick="openEditModal(${masterIdx}, ${addedIdx})">✏️</button>
          <button class="btn-del" onclick="openDelete(${masterIdx}, ${addedIdx})">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  attachResultsKeyNav();
}

// ─── キーボード操作（検索結果テーブル）───────────
function attachResultsKeyNav() {
  const rows = Array.from(document.querySelectorAll('#tableBody tr[tabindex="0"]'));
  rows.forEach((row, i) => {
    row.addEventListener('keydown', (e) => {
      // ボタン等の子要素からのバブリングは処理しない（Enterキーのネイティブ動作を守る）
      if (e.target !== row) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = rows[i + 1];
        if (next) { next.focus(); next.scrollIntoView({ block: 'nearest' }); }
        else {
          // 最終行から↓で発注リストへ
          const firstOrderRow = document.querySelector('#orderListBody tr[tabindex="0"]');
          if (firstOrderRow) { firstOrderRow.focus(); firstOrderRow.scrollIntoView({ block: 'nearest' }); }
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = rows[i - 1];
        if (prev) { prev.focus(); prev.scrollIntoView({ block: 'nearest' }); }
        else searchInput.focus();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const addBtn = row.querySelector('.btn-add-list');
        if (addBtn) addBtn.focus();
      } else if (e.key === 'Escape') {
        searchInput.focus();
      }
    });

    // ボタン間の←→キー移動
    const addBtn = row.querySelector('.btn-add-list');
    const editBtn = row.querySelector('.btn-edit');
    const delBtn = row.querySelector('.btn-del');

    if (addBtn) {
      addBtn.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); if (editBtn) editBtn.focus(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); row.focus(); }
        else if (e.key === 'Escape') { e.preventDefault(); row.focus(); }
      });
    }
    if (editBtn) {
      editBtn.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); if (addBtn) addBtn.focus(); else row.focus(); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); if (delBtn) delBtn.focus(); }
        else if (e.key === 'Escape') { e.preventDefault(); row.focus(); }
      });
    }
    if (delBtn) {
      delBtn.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); if (editBtn) editBtn.focus(); else row.focus(); }
        else if (e.key === 'Escape') { e.preventDefault(); row.focus(); }
      });
    }
  });
}

// ─── 発注リスト ─────────────────────────────
function renderOrderList() {
  const panel = document.getElementById('order-list-panel');
  const body = document.getElementById('orderListBody');
  const footer = document.getElementById('orderListFooter');
  const title = document.getElementById('orderListTitle');
  const draftBadge = document.getElementById('draftBadge');

  if (!selectedHospital) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  title.textContent = selectedHospital + ' — 発注リスト';

  const listObj = getOrderList(selectedHospital);
  const items = listObj.keys.map(k => [k, listObj.entries[k]]).filter(([k, v]) => v);

  if (!items.length) {
    body.innerHTML = '<div class="order-list-empty">📋 リストに追加された品目はありません<br><small>検索結果の「リスト追加」ボタンで追加できます</small></div>';
    footer.style.display = 'none';
    draftBadge.style.display = 'none';
    setStep(2);
    return;
  }

  draftBadge.style.display = '';
  footer.style.display = 'flex';
  document.getElementById('orderItemCount').textContent = items.length;
  setStep(3);

  const rows = items.map(([key, {item: r, qty, remarksOverride}]) => {
    const wClass = wholesalerClass(r['wholesaler'] || '');
    const wBadge = wClass
      ? `<span class="badge-w ${wClass}">${esc(r['wholesaler'])}</span>`
      : `<span style="font-size:12px">${esc(r['wholesaler'] || '')}</span>`;
    const eKey = esc(key);
    const remarksVal = (remarksOverride !== undefined ? remarksOverride : (r['remarks'] || ''));
    return `<tr tabindex="0" data-order-key="${eKey}">
      <td class="td-order">${esc(r['orderName'] || '')}</td>
      <td class="td-ncd" style="${(r['ncdCode'] || '') === '-' ? 'text-align:center' : ''}">${esc(r['ncdCode'] || '')}</td>
      <td class="td-jan">${esc(r['janCode'] || '')}</td>
      <td class="td-maker">${esc(r['maker'] || '')}</td>
      <td>${wBadge}</td>
      <td class="td-product">${esc(r['productName'] || '')}</td>
      <td class="td-pack">${esc(r['package'] || '')}</td>
      <td class="td-notes"><span class="order-remarks-static">${esc(remarksVal)}</span></td>
      <td>
        <div class="order-list-count-cell">
          <button class="order-count-btn" onclick="changeQty('${eKey}', -1)">－</button>
          <input class="order-count-num" type="number" min="1" value="${qty}" data-key="${eKey}"
            onchange="setQtyDirect('${eKey}', this)"
            oninput="setQtyDirect('${eKey}', this)" />
          <button class="order-count-btn" onclick="changeQty('${eKey}', 1)">＋</button>
        </div>
      </td>
      <td><button class="btn-remove-item" onclick="removeFromOrderList('${eKey}')">削除</button></td>
    </tr>`;
  }).join('');

  body.innerHTML = `<div class="table-wrap"><table class="order-list-table">
    <thead><tr>
      <th style="min-width:180px">院所発注表記</th>
      <th>NCDコード</th>
      <th>JANコード</th>
      <th>メーカー</th>
      <th>納入卸</th>
      <th>品名</th>
      <th>包装</th>
      <th style="max-width:200px">備考</th>
      <th style="min-width:100px">数量</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
  attachOrderListKeyNav();
}

// ─── Modal (Add / Edit) ──────────────────────
function openAddModal() {
  if (!selectedHospital) return;
  modalMode = 'add';
  editTarget = null;
  document.getElementById('modalIcon').textContent = '➕';
  document.getElementById('modalTitleText').textContent = selectedHospital + ' — 新規商品追加';
  document.getElementById('modalBadge').className = 'modal-new-badge';
  document.getElementById('modalBadge').textContent = '新規';
  clearModalFields();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f-orderName').focus(), 50);
}

function openEditModal(masterIdx, addedIdx) {
  if (!selectedHospital) return;
  modalMode = 'edit';
  editTarget = { masterIdx, addedIdx };
  document.getElementById('modalIcon').textContent = '✏️';
  document.getElementById('modalTitleText').textContent = selectedHospital + ' — 商品編集';
  document.getElementById('modalBadge').className = 'modal-edit-badge';
  document.getElementById('modalBadge').textContent = '編集';

  let item;
  if (addedIdx >= 0) {
    item = getLocalEdits(selectedHospital).added[addedIdx];
  } else if (masterIdx >= 0) {
    const edits = getLocalEdits(selectedHospital);
    item = edits.edited[masterIdx] || MASTER_DATA[selectedHospital][masterIdx];
  }
  if (!item) return;

  document.getElementById('f-orderName').value = item.orderName || '';
  document.getElementById('f-maker').value = item.maker || '';
  document.getElementById('f-wholesaler').value = item.wholesaler || '';
  document.getElementById('f-productName').value = item.productName || '';
  document.getElementById('f-package').value = item.package || '';
  document.getElementById('f-ncdCode').value = item.ncdCode || '';
  document.getElementById('f-janCode').value = item.janCode || '';
  document.getElementById('f-remarks').value = item.remarks || '';

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f-orderName').focus(), 50);
}

function clearModalFields() {
  ['f-orderName','f-maker','f-wholesaler','f-productName','f-package','f-ncdCode','f-janCode','f-remarks'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// 編集前の行情報を保持（保存/キャンセル後にフォーカスを戻すため）
let lastEditTarget = null;

function closeModal() {
  // モーダルを閉じる前に編集対象を記憶
  if (editTarget) {
    lastEditTarget = { ...editTarget };
  }
  document.getElementById('modalOverlay').classList.remove('open');
  modalMode = null;
  editTarget = null;
  // フォーカスを元の行に戻す
  focusEditedRow();
}

function focusEditedRow() {
  setTimeout(() => {
    if (!lastEditTarget) {
      searchInput.focus();
      return;
    }
    const rows = Array.from(document.querySelectorAll('#tableBody tr[tabindex="0"]'));
    let targetRow = null;
    for (const row of rows) {
      const editBtn = row.querySelector('.btn-edit');
      if (editBtn) {
        const onclickAttr = editBtn.getAttribute('onclick') || '';
        const { masterIdx, addedIdx } = lastEditTarget;
        if (onclickAttr === `openEditModal(${masterIdx}, ${addedIdx})`) {
          targetRow = row;
          break;
        }
      }
    }
    if (targetRow) {
      targetRow.focus();
      targetRow.scrollIntoView({ block: 'nearest' });
    } else if (rows.length > 0) {
      rows[0].focus();
      rows[0].scrollIntoView({ block: 'nearest' });
    } else {
      searchInput.focus();
    }
    lastEditTarget = null;
  }, 50);
}

function saveItem() {
  const orderName = document.getElementById('f-orderName').value.trim();
  if (!orderName) { alert('院所発注表記は必須です'); return; }

  const newItem = {
    facility: selectedHospital,
    orderName,
    maker: document.getElementById('f-maker').value.trim(),
    wholesaler: document.getElementById('f-wholesaler').value.trim(),
    productName: document.getElementById('f-productName').value.trim(),
    package: document.getElementById('f-package').value.trim(),
    ncdCode: document.getElementById('f-ncdCode').value.trim(),
    janCode: document.getElementById('f-janCode').value.trim(),
    remarks: document.getElementById('f-remarks').value.trim(),
  };

  // 保存後にフォーカスを戻すため、編集対象を記憶
  const savedTarget = editTarget ? { ...editTarget } : null;
  const savedMode = modalMode;

  const edits = getLocalEdits(selectedHospital);

  if (modalMode === 'add') {
    edits.added.push(newItem);
  } else if (modalMode === 'edit' && editTarget) {
    if (editTarget.addedIdx >= 0) {
      edits.added[editTarget.addedIdx] = newItem;
    } else if (editTarget.masterIdx >= 0) {
      edits.edited[editTarget.masterIdx] = newItem;
    }
  }

  saveLocalEdits(); // localStorageに永続保存

  // モーダルを閉じる（lastEditTargetは設定しない）
  document.getElementById('modalOverlay').classList.remove('open');
  modalMode = null;
  editTarget = null;

  renderTable();
  buildHospitalGrid();

  // 保存後、元の行にフォーカスを戻す
  if (savedTarget) {
    lastEditTarget = savedTarget;
  } else if (savedMode === 'add') {
    // 新規追加の場合：追加した行（最後のadded）にフォーカス
    const addedLen = getLocalEdits(selectedHospital).added.length;
    lastEditTarget = { masterIdx: -1, addedIdx: addedLen - 1 };
  }
  focusEditedRow();
}

// ─── Delete ─────────────────────────────────
let pendingDelete = null;

function openDelete(masterIdx, addedIdx) {
  if (!selectedHospital) return;
  pendingDelete = { masterIdx, addedIdx };
  const edits = getLocalEdits(selectedHospital);
  let item;
  if (addedIdx >= 0) item = edits.added[addedIdx];
  else if (masterIdx >= 0) item = edits.edited[masterIdx] || MASTER_DATA[selectedHospital][masterIdx];
  const name = item ? (item.orderName || item.productName || '不明') : '不明';
  document.getElementById('confirmMsg').textContent = `「${name}」を削除しますか？`;
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  pendingDelete = null;
}

function confirmOk() {
  if (!pendingDelete || !selectedHospital) { closeConfirm(); return; }
  const { masterIdx, addedIdx } = pendingDelete;
  const edits = getLocalEdits(selectedHospital);
  if (addedIdx >= 0) {
    edits.added.splice(addedIdx, 1);
  } else if (masterIdx >= 0) {
    edits.deleted.add(masterIdx);
    delete edits.edited[masterIdx];
  }
  saveLocalEdits(); // localStorageに永続保存
  closeConfirm();
  pendingDelete = null;
  renderTable();
  buildHospitalGrid();
}

// Close modals on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('confirmOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

// ─── モーダル内キーボードナビゲーション ─────────
(function attachModalKeyNav() {
  // フォーカス順（↑↓で移動）
  const fieldIds = [
    'f-orderName',
    'f-maker', 'f-wholesaler',
    'f-productName',
    'f-package', 'f-ncdCode',
    'f-janCode', 'f-remarks',
  ];
  const fields = fieldIds.map(id => document.getElementById(id));
  const btnCancel = document.querySelector('#modalOverlay .btn-secondary');
  const btnSave   = document.querySelector('#modalOverlay .btn-primary');
  const allFocusable = [...fields, btnCancel, btnSave];

  // 同じ行の左右ペア（←→で移動）
  const rowPairs = [
    [document.getElementById('f-maker'),    document.getElementById('f-wholesaler')],
    [document.getElementById('f-package'),  document.getElementById('f-ncdCode')],
    [document.getElementById('f-janCode'),  document.getElementById('f-remarks')],
    [btnCancel, btnSave],
  ];

  function moveFocus(current, delta) {
    const idx = allFocusable.indexOf(current);
    if (idx < 0) return;
    const next = allFocusable[idx + delta];
    if (next) next.focus();
  }

  function getRowPeer(el, dir) {
    for (const [left, right] of rowPairs) {
      if (el === left  && dir > 0) return right;
      if (el === right && dir < 0) return left;
    }
    return null;
  }

  allFocusable.forEach(el => {
    el.addEventListener('keydown', e => {
      switch (e.key) {
        case 'Enter':
          // 入力フィールドではEnterで次の項目に移動（ボタンでは通常動作）
          if (el.tagName === 'INPUT') {
            e.preventDefault();
            moveFocus(el, 1);
          }
          break;
        case 'ArrowDown':
          e.preventDefault();
          moveFocus(el, 1);
          break;
        case 'ArrowUp':
          e.preventDefault();
          moveFocus(el, -1);
          break;
        case 'ArrowRight': {
          const peer = getRowPeer(el, 1);
          if (peer) { e.preventDefault(); peer.focus(); }
          break;
        }
        case 'ArrowLeft': {
          const peer = getRowPeer(el, -1);
          if (peer) { e.preventDefault(); peer.focus(); }
          break;
        }
        case 'Escape':
          e.preventDefault();
          closeModal();
          break;
      }
    });
  });
})();
